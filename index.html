<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#0d1b2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="주식알림">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>주식 인텔리전스</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent
    }

    body {
      background: #080c14;
      color: #e8eaf0;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto
    }

    /* 헤더 */
    .hdr {
      background: linear-gradient(135deg, #0d1b2e, #0a1628);
      border-bottom: 1px solid #1a2744;
      padding: 13px 16px;
      position: sticky;
      top: 0;
      z-index: 100
    }

    .hdot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4a6fa5;
      display: inline-block;
      margin-right: 7px;
      vertical-align: middle;
      transition: all .5s
    }

    .hdot.on {
      background: #00ff88;
      box-shadow: 0 0 8px #00ff88
    }

    .htit {
      font-size: 17px;
      font-weight: 700;
      background: linear-gradient(90deg, #fff, #7eb8f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 4px 0 2px
    }

    .hdate {
      font-size: 10px;
      color: #4a6fa5
    }

    /* API 키 */
    .abox {
      background: #0d1b2e;
      border: 1px solid #1a3a6e;
      border-radius: 10px;
      padding: 14px 16px;
      margin: 14px 16px 0
    }

    .abox h3 {
      font-size: 13px;
      color: #7eb8f7;
      margin-bottom: 8px
    }

    .akrow {
      background: #0a1628;
      border: 1px solid #1a3a6e;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px
    }

    .aktop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px
    }

    .aktit {
      font-size: 12px;
      color: #7eb8f7;
      font-weight: 700
    }

    .akst {
      font-size: 11px
    }

    .ainrow {
      display: flex;
      gap: 8px
    }

    .ain {
      flex: 1;
      background: #080c14;
      border: 1px solid #1a3a6e;
      border-radius: 7px;
      padding: 9px 12px;
      color: #e8eaf0;
      font-size: 12px;
      outline: none;
      font-family: inherit
    }

    .ain:focus {
      border-color: #0055ff
    }

    .asave {
      background: linear-gradient(135deg, #0055ff, #003399);
      border: none;
      border-radius: 7px;
      padding: 9px 14px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap
    }

    .adel {
      background: #1a2744;
      border: none;
      border-radius: 7px;
      padding: 9px 12px;
      color: #4a6fa5;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit
    }

    .aguide {
      background: #0a2040;
      border: 1px solid #1a3a6e;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 8px;
      font-size: 11px;
      color: #4a6fa5;
      line-height: 2
    }

    .aguide a {
      color: #7eb8f7;
      text-decoration: none
    }

    .atestbtn {
      width: 100%;
      background: linear-gradient(135deg, #1a3a6e, #0d2040);
      border: 1px solid #1a5aaa;
      border-radius: 8px;
      padding: 10px;
      color: #7eb8f7;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-top: 6px;
      transition: all .3s
    }

    /* 버튼 */
    .bwrap {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 17px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: .5px;
      transition: all .3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed
    }

    .bcol {
      background: linear-gradient(135deg, #0055ff, #003399);
      color: #fff;
      box-shadow: 0 5px 18px rgba(0, 85, 255, .4)
    }

    .bcol.run {
      background: #1a2744;
      color: #4a6fa5;
      box-shadow: none
    }

    .bcol.fin {
      background: linear-gradient(135deg, #1a3a6e, #0d2040);
      box-shadow: none
    }

    .bshr {
      background: linear-gradient(135deg, #007A33, #005522);
      color: #fff;
      box-shadow: 0 5px 18px rgba(0, 122, 51, .4);
      animation: popIn .4s ease
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(.95)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    /* 진행 */
    .pbox {
      background: #0d1b2e;
      border: 1px solid #1a2744;
      border-radius: 12px;
      padding: 14px 16px;
      margin: 0 16px
    }

    .srow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px
    }

    .scirc {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid #2a3a5a;
      background: #0a0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
      transition: all .3s
    }

    .scirc.L {
      border-color: #ffd700
    }

    .scirc.D {
      border-color: #00ff88;
      background: #001a0a
    }

    .scirc.E {
      border-color: #ff4444;
      background: #1a0000
    }

    .slbl {
      font-size: 12px;
      flex: 1;
      color: #4a6fa5
    }

    .slbl.L {
      color: #ffd700
    }

    .slbl.D {
      color: #00ff88;
      font-weight: 700
    }

    .slbl.E {
      color: #ff4444
    }

    .ssub {
      font-size: 10px;
      color: #2a3a5a
    }

    .pbar {
      height: 4px;
      background: #1a2744;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px
    }

    .pfill {
      height: 100%;
      background: linear-gradient(90deg, #0055ff, #00ff88);
      border-radius: 2px;
      transition: width .6s
    }

    .pmsg {
      font-size: 12px;
      text-align: center;
      padding: 9px;
      border-radius: 8px;
      margin-top: 8px;
      line-height: 1.5
    }

    .pmsg.C {
      color: #ffd700;
      background: #1a1500
    }

    .pmsg.S {
      color: #00ff88;
      background: #001a0a;
      font-weight: 700
    }

    .pmsg.E {
      color: #ff8888;
      background: #1a0000
    }

    /* 탭 */
    .tabs {
      display: flex;
      background: #0a0f1a;
      border-top: 1px solid #1a2744;
      border-bottom: 1px solid #1a2744;
      overflow-x: auto;
      margin-top: 14px;
      position: sticky;
      top: 76px;
      z-index: 99
    }

    .tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 10px 12px;
      color: #4a6fa5;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      position: relative
    }

    .tab.on {
      border-bottom-color: #0055ff;
      color: #7eb8f7;
      font-weight: 700
    }

    .tdot {
      position: absolute;
      top: 4px;
      right: 3px;
      width: 5px;
      height: 5px;
      border-radius: 50%
    }

    /* 콘텐츠 */
    .cnt {
      padding: 12px 14px 80px
    }

    .sbox {
      background: linear-gradient(135deg, #0d1b2e, #0a2040);
      border: 1px solid #1a3a6e;
      border-radius: 9px;
      padding: 11px 14px;
      margin-bottom: 11px;
      display: flex;
      gap: 8px;
      font-size: 12px;
      color: #e8eaf0;
      line-height: 1.5
    }

    .card {
      background: #0d1b2e;
      border: 1px solid #1a2744;
      border-radius: 9px;
      padding: 12px 14px;
      margin-bottom: 9px
    }

    .cardh {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 6px
    }

    .rk {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      color: #fff
    }

    .dis {
      font-size: 11px;
      color: #a0b4cc;
      margin-bottom: 4px
    }

    .rsn {
      font-size: 11px;
      color: #7eb8f7;
      margin-bottom: 3px;
      line-height: 1.5
    }

    .rsk {
      font-size: 10px;
      color: #ff8888;
      margin-bottom: 8px
    }

    .cf {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap
    }

    .scb {
      min-width: 110px
    }

    .scr {
      margin-bottom: 3px
    }

    .sclr {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2px
    }

    .sbar {
      height: 3px;
      background: #1a2744;
      border-radius: 2px
    }

    .sfil {
      height: 100%;
      border-radius: 2px
    }

    .sr {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin: 7px 0
    }

    .stat {
      text-align: center
    }

    .statl {
      font-size: 9px;
      color: #4a6fa5;
      margin-bottom: 1px
    }

    .statv {
      font-size: 12px;
      font-weight: 700
    }

    .statv.big {
      font-size: 18px
    }

    .stathl {
      background: #001a0a;
      border-radius: 6px;
      padding: 4px 10px
    }

    .mc {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin: 6px 0
    }

    .mkb {
      background: linear-gradient(135deg, #0d1b2e, #0a2040);
      border: 1px solid #1a3a6e;
      border-radius: 10px;
      padding: 13px;
      margin-bottom: 11px
    }

    .slb2 {
      font-size: 10px;
      color: #4a6fa5;
      letter-spacing: 1px;
      margin: 10px 0 7px;
      font-weight: 600
    }

    .mrow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0d1b2e;
      border: 1px solid #1a2744;
      border-radius: 7px;
      padding: 9px 12px;
      margin-bottom: 7px;
      gap: 8px
    }

    .ml {
      flex: 1;
      min-width: 0
    }

    .mn {
      font-size: 13px;
      font-weight: 700
    }

    .ms {
      font-size: 10px;
      color: #a0b4cc;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    @keyframes spin {
      from {
        transform: rotate(0)
      }

      to {
        transform: rotate(360deg)
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .spin {
      animation: spin 1s linear infinite;
      display: inline-block
    }
  </style>
</head>

<body>

  <div class="hdr">
    <div><span class="hdot" id="liveDot"></span><span style="font-size:9px;color:#4a6fa5;letter-spacing:2px">MARVEL GOLF
        · STOCK INTELLIGENCE</span></div>
    <div class="htit">🇰🇷 주식 인텔리전스 <button id="installBtn" onclick="installApp()"
        style="display:none; margin-left:10px; background:linear-gradient(135deg,#00ff88,#00cc66); color:#001a0a; border:none; padding:4px 10px; border-radius:12px; font-size:11px; font-weight:800; cursor:pointer; vertical-align:middle; box-shadow:0 2px 8px rgba(0,255,136,0.3); animation:popIn 0.5s ease;">📥
        앱 설치</button></div>
    <div class="hdate" id="hdate"></div>
  </div>

  <div id="apiArea"></div>

  <div class="bwrap">
    <button class="btn bcol" id="btnC" onclick="doCollect()">🔍 데이터 수집 시작</button>
    <div id="sharewrap" style="display:none">
      <button class="btn bshr" id="btnS" onclick="doShare()">📤 카톡으로 공유하기</button>
    </div>
  </div>

  <div id="progArea"></div>

  <div id="resultArea" style="display:none">
    <div class="tabs" id="tabBar"></div>
    <div class="cnt" id="tabCnt"></div>
  </div>

  <script>
    // ════ 전역 변수 ════
    var K1 = localStorage.getItem('gk1') || '';
    var K2 = localStorage.getItem('gk2') || '';
    var AK = K1 ? 1 : 2; // active key
    var MODELS = ['gemini-2.5-flash', 'gemini-2.5-flash-lite', 'gemini-2.0-flash-lite'];
    var MI = 0; // model index
    var BUSY = false, READY = false, CURTAB = 'all';
    var QUOTA1 = false, QUOTA2 = false;
    var ST = { all: 'W', today: 'W', week: 'W', plan: 'W' };
    var DD = { all: null, today: null, week: null, plan: null };
    var EM = {};

    var TODAY = (function () {
      var d = new Date();
      return d.getFullYear() + '년 ' + (d.getMonth() + 1) + '월 ' + d.getDate() + '일';
    })();

    document.getElementById('hdate').textContent = TODAY;
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(function () { });

    function sc(v) { return v >= 8 ? '#00ff88' : v >= 6 ? '#ffd700' : v >= 4 ? '#ff9933' : '#ff4444'; }
    function cc(s) { return (s || '').charAt(0) === '+' ? '#00ff88' : '#ff4444'; }
    function pc(p) { return !p ? '#4a6fa5' : p.indexOf('매우') >= 0 ? '#00ff88' : p.indexOf('높') >= 0 ? '#ffd700' : p.indexOf('중') >= 0 ? '#ff9933' : '#4a6fa5'; }
    function nf(s) { return s == null ? '' : String(s).replace(/\d{4,}/g, function (n) { return parseInt(n, 10).toLocaleString('en-US'); }); }
    function getKey() { return AK === 1 ? K1 : K2; }
    function getModel() { return MODELS[MI] || 'gemini-2.5-flash'; }
    function sleep(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }

    // ════ API 키 UI ════
    function renderAPI() {
      var el = document.getElementById('apiArea');
      if (!el) return;

      var h = '<div class="abox">';
      h += '<h3>🔑 Gemini API 키 <span style="background:#00ff8811;border:1px solid #00ff8833;border-radius:5px;padding:2px 8px;font-size:10px;color:#00ff88">✅ 무료</span></h3>';

      // 키 1
      h += '<div class="akrow">';
      h += '<div class="aktop"><span class="aktit">키 1 (주)</span>';
      h += K1 ? '<span class="akst" style="color:#00ff88">' + (AK === 1 ? '🟢 사용중' : '⚪ 대기') + '</span>' : '<span class="akst" style="color:#ff4444">❌ 미설정</span>';
      h += '</div><div class="ainrow">';
      if (K1) {
        h += '<input class="ain" type="password" value="●●●●●●●●" disabled>';
        h += '<button class="adel" onclick="delKey(1)">삭제</button>';
      } else {
        h += '<input class="ain" id="in1" type="password" placeholder="AIza...">';
        h += '<button class="asave" onclick="saveKey(1)">저장</button>';
      }
      h += '</div></div>';

      // 키 2
      h += '<div class="akrow">';
      h += '<div class="aktop"><span class="aktit">키 2 (자동전환)</span>';
      h += K2 ? '<span class="akst" style="color:#00ff88">' + (AK === 2 ? '🟢 사용중' : '⚪ 대기') + '</span>' : '<span class="akst" style="color:#4a6fa5">미설정 (선택)</span>';
      h += '</div><div class="ainrow">';
      if (K2) {
        h += '<input class="ain" type="password" value="●●●●●●●●" disabled>';
        h += '<button class="adel" onclick="delKey(2)">삭제</button>';
      } else {
        h += '<input class="ain" id="in2" type="password" placeholder="AIza...">';
        h += '<button class="asave" onclick="saveKey(2)">저장</button>';
      }
      h += '</div></div>';

      // 테스트 버튼
      if (K1 || K2) {
        h += '<button class="atestbtn" id="testBtn" onclick="testConn()">🔍 API 연결 테스트</button>';
      }

      // 가이드
      h += '<div class="aguide">';
      h += '무료 키 발급: <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a><br>';
      h += '구글 로그인 → Create API Key → AIza... 복사 → 저장<br>';
      h += '<span style="color:#00ff88">💡 구글 계정 2개로 키 2개 = 무제한!</span>';
      h += '</div></div>';

      el.innerHTML = h;
    }

    function saveKey(n) {
      var inp = document.getElementById('in' + n);
      if (!inp) return;
      var v = inp.value.trim();
      if (!v || v.indexOf('AIza') !== 0) { alert('올바른 Gemini API 키를 입력해주세요\n(AIza로 시작합니다)'); return; }
      if (n === 1) { K1 = v; localStorage.setItem('gk1', v); if (!K2) AK = 1; }
      else { K2 = v; localStorage.setItem('gk2', v); }
      renderAPI();
    }

    function delKey(n) {
      if (n === 1) { K1 = ''; localStorage.removeItem('gk1'); if (AK === 1) AK = K2 ? 2 : 1; }
      else { K2 = ''; localStorage.removeItem('gk2'); if (AK === 2) AK = 1; }
      renderAPI();
    }

    async function testConn() {
      var btn = document.getElementById('testBtn');
      if (!btn) return;
      btn.textContent = '⟳ 테스트 중...';
      btn.disabled = true;
      MI = 0;

      for (var i = 0; i < MODELS.length; i++) {
        var m = MODELS[i];
        var url = 'https://generativelanguage.googleapis.com/v1beta/models/' + m + ':generateContent?key=' + getKey();
        try {
          var res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: 'hi' }] }], generationConfig: { maxOutputTokens: 10 } })
          });
          if (res.ok) {
            MI = i;
            alert('✅ 연결 성공!\n모델: ' + m);
            btn.textContent = '✅ 연결됨: ' + m;
            btn.style.background = 'linear-gradient(135deg,#007A33,#005522)';
            btn.style.color = '#fff';
            btn.disabled = false;
            return;
          }
          var ej = await res.json().catch(function () { return {}; });
          var em = (ej.error && ej.error.message) || '';
          if (em.indexOf('NOT_FOUND') >= 0 || em.indexOf('not found') >= 0) continue;
          if (em.indexOf('quota') >= 0 || res.status === 429) { alert('⚠️ 한도 초과\n내일 다시 시도하거나 키 2를 추가하세요'); break; }
          if (em.indexOf('API_KEY_INVALID') >= 0 || res.status === 400) { alert('❌ API 키 오류\naistudio.google.com/app/apikey 에서 새 키 발급'); break; }
        } catch (e) { continue; }
      }
      btn.textContent = '🔍 API 연결 테스트';
      btn.disabled = false;
    }

    // ════ Gemini 호출 ════
    async function callGemini(prompt) {
      var key = getKey();
      if (!key) throw new Error('API 키를 입력해주세요');
      var RETRY = 3;
      var lastErr = '오류';

      for (var i = 0; i < RETRY; i++) {
        var url = 'https://generativelanguage.googleapis.com/v1beta/models/' + getModel() + ':generateContent?key=' + key;
        try {
          var res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ role: 'user', parts: [{ text: prompt }] }],
              generationConfig: { temperature: 0.1, maxOutputTokens: 4096, responseMimeType: 'application/json' }
            })
          });

          if (res.ok) {
            var j = await res.json();
            var parts = [];
            try { parts = j.candidates[0].content.parts; } catch (e) { }
            var text = parts.map(function (p) { return p.text || ''; }).join('').trim();
            if (!text) throw new Error('빈 응답');
            return parseJSON(text);
          }

          var ej = await res.json().catch(function () { return {}; });
          var em = (ej.error && ej.error.message) || ('HTTP ' + res.status);

          if (em.indexOf('NOT_FOUND') >= 0 || em.indexOf('not found') >= 0) {
            if (MI < MODELS.length - 1) { MI++; lastErr = '모델변경:' + getModel(); await sleep(500); continue; }
          }
